version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: logitrack_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lastmile_tracker
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d lastmile_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logitrack_net

  backend:
    build:
      context: ./lastmile-backend
      dockerfile: Dockerfile
    container_name: logitrack_backend
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DB_URL=jdbc:postgresql://postgres:5432/lastmile_tracker
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-adityaprajapati4405@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - RAZORPAY_KEY=${RAZORPAY_KEY}
      - RAZORPAY_SECRET=${RAZORPAY_SECRET}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - logitrack_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logitrack_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - logitrack_net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  logitrack_net:
    driver: bridge
