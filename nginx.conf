server {
    listen 80;
    server_name localhost;

    # Gzip Compression settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets and fall back to index.html for React Router SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API requests to backend Spring Boot container
    location /api {
        proxy_pass http://backend:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy STOMP WebSocket traffic to backend container
    location /ws {
        proxy_pass http://backend:8084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy OpenAPI spec definitions
    location /v3/api-docs {
        proxy_pass http://backend:8084;
        proxy_set_header Host $host;
    }

    # Proxy Swagger UI explorer
    location /swagger-ui {
        proxy_pass http://backend:8084;
        proxy_set_header Host $host;
    }
}
