# Server Configuration
server.port=${PORT:8084}

# Database Configuration (MySQL/TiDB)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lastmile_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
